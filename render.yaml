services:
  - type: web
    name: nexus-api
    runtime: docker
    plan: free
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/ready
    envVars:
      - key: NEXUS_ENV
        value: production
      - key: NEXUS_AUTH_BACKEND
        value: database
      - key: NEXUS_ALLOW_PASSWORD_REGISTRATION
        value: false
      - key: NEXUS_DEMO_OWNER_EMAIL_HASHES
        sync: false
      - key: NEXUS_WEB_URL
        value: https://nexus-advait-pm.web.app
      - key: NEXUS_API_URL
        value: https://nexus-api-7fgu.onrender.com
      - key: NEXUS_ALLOWED_HOSTS
        value: nexus-api-7fgu.onrender.com
      - key: NEXUS_CORS_ORIGINS
        value: https://advait-maheshwari.github.io
      - key: FIREBASE_PROJECT_ID
        value: nexus-advait-pm
      - key: NEXUS_REQUIRE_EMAIL_VERIFICATION
        value: false
      - key: NEXUS_EMAIL_DELIVERY_MODE
        value: disabled
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 15
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 14
      - key: DATABASE_URL
        sync: false
