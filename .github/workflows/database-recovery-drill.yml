name: Database Recovery Drill

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/database-recovery-drill.yml"
      - "ops/backup_database.py"
      - "ops/restore_database.py"
  schedule:
    - cron: "17 3 * * 0"

concurrency:
  group: nexus-database-recovery
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  backup-and-restore:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexus_restore_drill
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus -d nexus_restore_drill"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install verified PostgreSQL 18 client and OpenSSL
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes ca-certificates curl gnupg openssl
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl --fail --silent --show-error \
            --output /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          fingerprint="$(gpg --show-keys --with-colons \
            /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            | awk -F: '$1 == "fpr" { print $10; exit }')"
          test "$fingerprint" = "B97B0AFCAA1A47F044F244A07FCC7D46ACCC4CF8"
          . /etc/os-release
          architecture="$(dpkg --print-architecture)"
          sudo tee /etc/apt/sources.list.d/pgdg.sources >/dev/null <<EOF
          Types: deb
          URIs: https://apt.postgresql.org/pub/repos/apt
          Suites: ${VERSION_CODENAME}-pgdg
          Architectures: ${architecture}
          Components: main
          Signed-By: /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          EOF
          sudo apt-get update
          sudo apt-get install --yes postgresql-client-18
          echo "/usr/lib/postgresql/18/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/18/bin/pg_dump --version

      - name: Validate recovery secrets
        shell: bash
        run: |
          test -n "$DATABASE_URL" || { echo "::error::NEXUS_NEON_DATABASE_URL is not configured"; exit 1; }
          test -n "$NEXUS_BACKUP_PASSPHRASE" || { echo "::error::NEXUS_BACKUP_PASSPHRASE is not configured"; exit 1; }
        env:
          DATABASE_URL: ${{ secrets.NEXUS_NEON_DATABASE_URL }}
          NEXUS_BACKUP_PASSPHRASE: ${{ secrets.NEXUS_BACKUP_PASSPHRASE }}

      - name: Create encrypted Neon backup
        run: python ops/backup_database.py --output-dir backups/recovery-drill
        env:
          DATABASE_URL: ${{ secrets.NEXUS_NEON_DATABASE_URL }}
          NEXUS_BACKUP_PASSPHRASE: ${{ secrets.NEXUS_BACKUP_PASSPHRASE }}

      - name: Restore into disposable PostgreSQL
        shell: bash
        run: |
          backup="$(find backups/recovery-drill -name '*.dump.enc' -type f -print -quit)"
          test -n "$backup"
          python ops/restore_database.py "$backup" --confirm-database nexus_restore_drill
        env:
          DATABASE_URL: postgresql://nexus:nexus@localhost:5432/nexus_restore_drill?sslmode=disable
          NEXUS_ALLOW_RESTORE: "true"
          NEXUS_BACKUP_PASSPHRASE: ${{ secrets.NEXUS_BACKUP_PASSPHRASE }}

      - name: Verify restored schema
        run: |
          test "$(psql "$DATABASE_URL" --tuples-only --no-align --command 'select count(*) from alembic_version')" = "1"
          psql "$DATABASE_URL" --command '\dt'
        env:
          DATABASE_URL: postgresql://nexus:nexus@localhost:5432/nexus_restore_drill?sslmode=disable

      - name: Retain encrypted recovery artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: nexus-encrypted-recovery-drill
          path: backups/recovery-drill/*
          if-no-files-found: error
          retention-days: 7
